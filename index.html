<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My New Website</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #f4f7f6; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        input { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #0056b3; }
        h1 { color: #333; text-align: center; }
        .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-left: 5px solid #007bff; font-size: 18px; color: #333; }
    </style>
</head>
<body>

    <div class="box">
        <h1>My New Website</h1>
        
        <input type="text" id="myInput" placeholder="Type something here...">
        <button onclick="saveData()">Save to Cloud</button>
        
        <div class="result">
            <strong>Cloud Dynamic Content:</strong>
            <p id="cloudText">Waiting for data...</p>
        </div>
    </div>

<script>
    // Your web app's Firebase configuration (xindongfang)
    const firebaseConfig = {
        apiKey: "AIzaSyDNhhwjtt1W2FX5cAXX20widg9jJlGrBCg",
        authDomain: "xindongfang.firebaseapp.com",
        databaseURL: "https://xindongfang-default-rtdb.firebaseio.com",
        projectId: "xindongfang",
        storageBucket: "xindongfang.firebasestorage.app",
        messagingSenderId: "915387291334",
        appId: "1:915387291334:web:b1629f5173d929fb2d69c7"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Write Data Function
    function saveData() {
        const userInput = document.getElementById('myInput').value;
        
        database.ref('test_message').set({
            text: userInput
        }).then(() => {
            alert('Saved successfully!');
        }).catch((error) => {
            alert('Save failed: ' + error.message);
        });
    }

    // Read and Sync Data Function
    database.ref('test_message').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('cloudText').innerText = data.text;
        }
    });
</script>

</body>
</html>
